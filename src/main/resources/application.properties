# ============================================================
# LOAN MANAGEMENT SYSTEM - SaaS Production Configuration
# ============================================================

spring.application.name=loanmanagementsystem

# ============================================================
# DATABASE
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/loan_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Rohith@358
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================================
# JWT CONFIGURATION
# ============================================================
app.jwt-secret=5bA9dF2gH7kL0mN3pQ8sT1vW4xY6zA9bC2eF5hJ8kM1nP4qR7uX0yZ3cD6gI9jL
app.jwt-expiration-milliseconds=86400000
app.jwt-refresh-expiration-days=7

# ============================================================
# EMAIL (Gmail SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email from address
app.mail.from=noreply@loanmanagementsystem.com
app.mail.from-name=Loan Management System

# ============================================================
# ASYNC / THREAD POOL
# ============================================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=loan-async-

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS

# ============================================================
# OAUTH2 - GOOGLE
# ============================================================
spring.security.oauth2.client.registration.google.client-id=444986169850-jen8j8ah503bhr2if67aoa6odb1jshqp.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:xxx-replace-with-your-secret-xxx}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=email,profile

# OAuth2 redirect after success
app.oauth2.success-redirect-url=http://localhost:3000/oauth2/callback

# ============================================================
# MULTIPART FILE UPLOAD (Excel)
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ============================================================
# LOGGING
# ============================================================
logging.level.com.loanmanagement=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# SPRINGDOC OPENAPI (Swagger)
# ============================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true