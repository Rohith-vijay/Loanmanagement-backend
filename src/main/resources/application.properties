# ============================================================
# LOAN MANAGEMENT SYSTEM - PRODUCTION READY
# ============================================================

spring.application.name=loanmanagementsystem

# ============================================================
# DATABASE (Railway MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================================
# JWT CONFIGURATION
# ============================================================
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-milliseconds=86400000
app.jwt-refresh-expiration-days=7

# ============================================================
# EMAIL (Gmail SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${MAIL_FROM}
app.mail.from-name=Loan Management System

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=${CORS_ORIGINS}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS

# ============================================================
# OAUTH2 - GOOGLE
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile

# ============================================================
# OAUTH2 - GITHUB
# ============================================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# OAuth2 redirect after success
app.oauth2.success-redirect-url=${OAUTH2_REDIRECT_URL}

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ============================================================
# LOGGING
# ============================================================
logging.level.com.loanmanagement=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ============================================================
# SWAGGER
# ============================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
